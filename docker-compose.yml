version: "3.9"

services:
  web:
    build: .
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - staticfiles:/app/staticfiles
    expose:
      - "8000"
    # Run migrations + collectstatic on startup, then launch gunicorn
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    environment:
      - DOMAIN=${DOMAIN}
      # Only substitute ${DOMAIN} — leave $host, $remote_addr etc. untouched
      - NGINX_ENVSUBST_TEMPLATE_VARS=DOMAIN
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
      - staticfiles:/app/staticfiles:ro
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    # Run with: docker compose run --rm certbot
    # Renewal:  docker compose run --rm certbot renew
    entrypoint: >
      certbot certonly
        --webroot
        --webroot-path=/var/www/certbot
        --email ${LETSENCRYPT_EMAIL}
        --agree-tos
        --no-eff-email
        -d ${DOMAIN}

volumes:
  staticfiles:
