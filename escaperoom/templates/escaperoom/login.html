{% extends "escaperoom/base.html" %}
{% block title %}Login — {{ session.name }}{% endblock %}

{% block content %}
<div class="eyebrow">Team Login</div>
<h2>Enter the vault</h2>

{% if error %}
<div class="result fail">{{ error }}</div>
{% endif %}

<form method="post" style="margin-top:18px;">
  {% csrf_token %}
  <label for="team_name">Team Name</label>
  <input type="text" id="team_name" name="team_name" placeholder="e.g. Falcons" autocomplete="off" required>
  <label for="password">Password</label>
  <input type="password" id="password" name="password" placeholder="••••••••" required>
  <button type="submit">Log In</button>
</form>
{% endblock %}
